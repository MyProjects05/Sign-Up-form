<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheet.css">
    <title>Sign Up Form</title>
</head>
<body>
    <span>
        <img src="leaf.avif" alt="Leaf Picture" class=".image">
        <div class="Logo"><img src="odin-lined.png" alt="The odin Logo">
            <span>ODIN</span></div>
        <footer>Photo by <span>Halie West</span> on <span>Unsplash</span></footer>
    </span>
    <div class="right">
        <p><strong>
            This is not a real online service! You know you need something like thisin our life to 
            help you realize your deepest dreams. Sign up <em>now</em> to get started.
        </strong></p>
        <p><strong><em>You know you want to</em></strong></p>

        <form action="/Sign-Up-Form" method="post">
            <fieldset>
                <div class="legend">
                    <legend>Let's do this!</legend>
                </div>
                <div class="first">
                    <div class="first_half">
                        <label for="">First Name</label>
                        <input type="text">

                        <label for="">Email</label>
                        <input type="email">

                        <label for="">Password</label>
                        <input type="password">
                    </div>
                    <div class="second_half">
                        <label for="">Last Name</label>
                        <input type="text" name="" id="">

                        <label for="">Phone Number</label>
                        <input type="number" name="" id="">

                        <label for="">Confirm Password</label>
                        <input type="password" name="" id="">
                    </div>
                </div>
            </fieldset>

            <div>
                <button type="submit">Create Account</button>
            </div>
        </form>
        <div class="last">
            Already have an account? <a href="">Log In</a>
        </div>

    </div>
</body>
</html>
